 <!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口說練習 Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
.app { max-width: 780px; margin: 0 auto; padding: 16px; }

/* Nav */
.nav-bar  { display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px; }
.nav-btn  { padding: 6px 16px; background: white; border: 1px solid #e0e0e0; border-radius: 20px; cursor: pointer; font-size: 13px; color: #555; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all .15s; }
.nav-btn:hover { border-color: #5b4fcf; color: #5b4fcf; }

/* Setup */
.panel        { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
.app-title    { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.app-sub      { color: #888; font-size: 14px; margin-bottom: 24px; }
.sec-title    { font-size: 11px; font-weight: 700; color: #999; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 10px; }

.lang-toggle  { display: flex; background: #f0f4f8; border-radius: 10px; padding: 4px; gap: 4px; width: fit-content; margin-bottom: 24px; }
.lang-btn     { padding: 8px 24px; border: none; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; color: #888; background: transparent; transition: all .15s; }
.lang-btn.on  { background: white; color: #5b4fcf; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

.chip-group   { margin-bottom: 20px; }
.chip-row     { display: flex; flex-wrap: wrap; gap: 8px; }
.chip         { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #e0e0e0; cursor: pointer; font-size: 13px; color: #666; background: white; transition: all .15s; user-select: none; }
.chip.on      { background: #5b4fcf; border-color: #5b4fcf; color: white; font-weight: 600; }
.chip:hover:not(.on) { border-color: #5b4fcf; color: #5b4fcf; }

.level-row    { display: flex; border: 1.5px solid #e0e0e0; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.lvl-btn      { flex: 1; padding: 10px; border: none; border-right: 1px solid #e0e0e0; background: white; font-size: 13px; color: #666; cursor: pointer; transition: all .15s; }
.lvl-btn:last-child { border-right: none; }
.lvl-btn.on   { background: #5b4fcf; color: white; font-weight: 600; }

.start-btn    { width: 100%; padding: 14px; background: #5b4fcf; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
.start-btn:hover { background: #4a3fbe; }

/* Chat */
.chat-header  { background: white; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; }
.chat-tags    { display: flex; gap: 6px; flex-wrap: wrap; }
.tag          { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.tag-lang     { background: #ede9fe; color: #5b4fcf; }
.tag-scene    { background: #e0f2fe; color: #0369a1; }
.tag-level    { background: #fef3c7; color: #92400e; }
.end-btn      { padding: 6px 14px; background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }

.messages     { background: white; border-radius: 12px; padding: 16px; height: 420px; overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; scroll-behavior: smooth; }
.msg          { display: flex; margin-bottom: 14px; align-items: flex-start; gap: 10px; }
.msg.user     { flex-direction: row-reverse; }
.avatar       { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.msg.agent .avatar { background: #ede9fe; }
.msg.user  .avatar { background: #e0f7fa; }
.msg-body     { display: flex; flex-direction: column; max-width: 68%; }
.msg.user .msg-body { align-items: flex-end; }
.voice-tag    { font-size: 11px; color: #aaa; margin-bottom: 3px; font-style: italic; }
.bubble       { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; color: #222; }
.msg.agent .bubble { background: #f5f3ff; border-bottom-left-radius: 4px; }
.msg.user  .bubble { background: #e0f7fa; border-bottom-right-radius: 4px; }
.tts-btn      { background: none; border: none; cursor: pointer; font-size: 14px; opacity: 0.4; margin-top: 4px; align-self: flex-start; transition: opacity .15s; }
.tts-btn:hover { opacity: 1; }

.coach-box    { margin-top: 8px; padding: 10px 14px; border-radius: 10px; background: linear-gradient(135deg, #fefce8, #fef9c3); border: 1px solid #fde68a; font-size: 13px; line-height: 1.7; color: #713f12; }
.coach-title  { font-weight: 700; font-size: 12px; margin-bottom: 4px; color: #92400e; }
.coach-box br + br { display: none; }

.voice-select { font-size: 12px; padding: 4px 6px; border-radius: 6px; border: 1px solid #ddd; background: #fff; max-width: 180px; color: #333; }
.voice-row    { display: flex; align-items: center; gap: 6px; }
.voice-lbl    { font-size: 12px; color: #888; white-space: nowrap; }

.typing-bubble { padding: 14px 16px !important; }
.dot          { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #c4b5fd; margin: 0 2px; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

/* Input */
.input-area   { background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.text-row     { display: flex; gap: 8px; margin-bottom: 12px; }
#user-input   { flex: 1; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s; }
#user-input:focus { border-color: #5b4fcf; }
.send-btn     { padding: 10px 18px; background: #5b4fcf; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background .15s; }
.send-btn:hover { background: #4a3fbe; }
.send-btn:disabled { background: #c4b5fd; cursor: not-allowed; }

.voice-area   { display: flex; align-items: center; justify-content: center; gap: 24px; }
.mic-wrap     { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.mic-btn      { width: 54px; height: 54px; border-radius: 50%; border: none; background: #5b4fcf; color: white; font-size: 22px; cursor: pointer; transition: all .2s; box-shadow: 0 3px 10px rgba(91,79,207,.35); }
.mic-btn:hover { transform: scale(1.06); }
.mic-btn.rec  { background: #dc2626; animation: pulse 1.1s infinite; }
.mic-btn:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; transform: none; }
.mic-label    { font-size: 11px; color: #aaa; text-align: center; min-height: 16px; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)} 50%{box-shadow:0 0 0 10px rgba(220,38,38,0)} }

.toggle-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.toggle-sw    { position: relative; width: 36px; height: 20px; display: block; cursor: pointer; }
.toggle-sw input { opacity: 0; width: 0; height: 0; position: absolute; }
.t-track      { position: absolute; inset: 0; background: #d1d5db; border-radius: 10px; transition: background .2s; }
.toggle-sw input:checked + .t-track { background: #5b4fcf; }
.t-thumb      { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform .2s; pointer-events: none; }
.toggle-sw input:checked ~ .t-thumb { transform: translateX(16px); }
.toggle-lbl   { font-size: 11px; color: #aaa; }

.stop-btn     { background: none; border: none; cursor: pointer; font-size: 20px; opacity: .4; transition: opacity .15s; }
.stop-btn:hover { opacity: 1; }

/* History */
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.history-title  { font-size: 18px; font-weight: 700; color: #1a1a2e; }
.back-btn       { padding: 6px 14px; background: #f0f4f8; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; color: #555; }
.back-btn:hover { background: #e0e0e0; }
.sess-item      { border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all .15s; }
.sess-item:hover { border-color: #5b4fcf; background: #faf9ff; }
.sess-meta      { font-size: 12px; color: #aaa; margin-bottom: 6px; }
.sess-preview   { font-size: 13px; color: #444; line-height: 1.5; }
.sess-turns     { font-size: 12px; color: #5b4fcf; font-weight: 600; margin-top: 4px; }
.detail-turn    { margin-bottom: 16px; }
.detail-label   { font-size: 12px; color: #aaa; margin-bottom: 4px; }
.detail-bubble  { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; color: #222; }
.detail-user    { background: #e0f7fa; }
.detail-agent   { background: #f5f3ff; }
</style>
</head>
<body>
<div class="app">

<div class="nav-bar">
  <button class="nav-btn" onclick="showPanel('history')">📋 對話紀錄</button>
</div>

<!-- ── SETUP ── -->
<div id="panel-setup" class="panel">
  <div class="app-title">🎙️ 口說練習 Agent</div>
  <div class="app-sub">選擇語言、場景與等級，開始與 AI 練習對話</div>

  <div class="sec-title">練習語言</div>
  <div class="lang-toggle" style="margin-bottom:24px">
    <button class="lang-btn on" data-lang="en" onclick="pickLang(this)">🇺🇸 英文</button>
    <button class="lang-btn"   data-lang="ja" onclick="pickLang(this)">🇯🇵 日文</button>
  </div>

  <div class="chip-group">
    <div class="sec-title">AI 模型</div>
    <div class="chip-row" id="model-chips">
      <div class="chip on"  data-val="gemini-2.5-flash"  data-provider="gemini">⚡ Gemini 2.5 Flash</div>
      <div class="chip"     data-val="gemini-2.5-pro"    data-provider="gemini">🧠 Gemini 2.5 Pro</div>
      <div class="chip"     data-val="llama-3.3-70b-versatile" data-provider="groq">🦙 Groq Llama 3.3 70B</div>
      <div class="chip"     data-val="llama-3.1-8b-instant"    data-provider="groq">💨 Groq Llama 3.1 8B</div>
    </div>
  </div>

  <div class="chip-group">
    <div class="sec-title">練習場景</div>
    <div class="chip-row" id="scenario-chips">
      <div class="chip on"  data-val="daily">日常對話</div>
      <div class="chip"     data-val="travel">旅遊情境</div>
      <div class="chip"     data-val="interview">面試英文</div>
      <div class="chip"     data-val="business">商務會議</div>
      <div class="chip"     data-val="free">自由對話</div>
    </div>
  </div>

  <div class="sec-title">程度等級</div>
  <div class="level-row">
    <button class="lvl-btn"    data-val="beginner"     onclick="pickLevel(this)">🌱 初級</button>
    <button class="lvl-btn on" data-val="intermediate" onclick="pickLevel(this)">🔥 中級</button>
    <button class="lvl-btn"    data-val="advanced"     onclick="pickLevel(this)">⚡ 高級</button>
  </div>

  <button class="start-btn" onclick="startSession()">開始練習 →</button>
</div>

<!-- ── CHAT ── -->
<div id="panel-chat" style="display:none">
  <div class="chat-header">
    <div class="chat-tags">
      <span class="tag tag-lang"  id="tag-lang"></span>
      <span class="tag tag-scene" id="tag-scene"></span>
      <span class="tag tag-level" id="tag-level"></span>
    </div>
    <button class="end-btn" onclick="endSession()">✕ 結束練習</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="text-row">
      <input type="text" id="user-input" placeholder="輸入訊息，或點麥克風語音輸入…"
             oncompositionstart="isIMEComposing=true"
             oncompositionend="isIMEComposing=false"
             onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing&&!isIMEComposing){event.preventDefault();sendText();}">
      <button class="send-btn" id="send-btn" onclick="sendText()">送出</button>
    </div>
    <div class="voice-area">
      <div class="toggle-group">
        <label class="toggle-sw">
          <input type="checkbox" id="tts-on" checked>
          <div class="t-track"></div>
          <div class="t-thumb"></div>
        </label>
        <span class="toggle-lbl">自動朗讀</span>
      </div>
      <div class="voice-row">
        <span class="voice-lbl">🗣️ 語音</span>
        <select id="voice-select" class="voice-select"><option>載入中…</option></select>
      </div>
      <div class="mic-wrap">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
        <span class="mic-label" id="mic-label">點擊錄音</span>
      </div>
      <div class="toggle-group">
        <button class="stop-btn" onclick="stopSpeaking()" title="停止朗讀">⏹️</button>
        <span class="toggle-lbl">停止朗讀</span>
      </div>
    </div>
  </div>
</div>

<!-- ── HISTORY ── -->
<div id="panel-history" class="panel" style="display:none">
  <div class="history-header">
    <span class="history-title">📋 對話紀錄</span>
    <button class="back-btn" onclick="showPanel('setup')">← 返回</button>
  </div>
  <div id="history-body">
    <p style="color:#bbb;text-align:center;padding:24px;font-size:14px">載入中…</p>
  </div>
</div>

</div><!-- /app -->

<script>
// ════════════════════════════════════════════
// CONFIG — 填入你的 GAS 部署網址
// ════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyhkmwSk51fPrT4AO3OHceeSZbQaaAPbt3S_VHFGWC54m71VAx9mG4E12p6ayzGyo4/exec'
const LANG_META = {
  en: { label: '🇺🇸 英文', ttsLang: 'en-US', ttsRate: 0.90 },
  ja: { label: '🇯🇵 日文', ttsLang: 'ja-JP', ttsRate: 0.85 }
};
const SCENE_LABEL = { daily:'日常對話', travel:'旅遊情境', interview:'面試英文', business:'商務會議', free:'自由對話' };
const LEVEL_LABEL = { beginner:'初級 🌱', intermediate:'中級 🔥', advanced:'高級 ⚡' };
const MODEL_LABEL = {
  'gemini-2.5-flash':'⚡ Gemini 2.5 Flash',
  'gemini-2.5-pro':'🧠 Gemini 2.5 Pro',
  'llama-3.3-70b-versatile':'🦙 Groq Llama 3.3 70B',
  'llama-3.1-8b-instant':'💨 Groq Llama 3.1 8B'
};

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let lang          = 'en';
let scenario      = 'daily';
let level         = 'intermediate';
let model         = 'gemini-2.5-flash';
let provider      = 'gemini';
let history       = [];
let sessionId     = '';
let isSending     = false;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let tidCounter    = 0;
let isIMEComposing = false;  // 追蹤 IME 輸入法組字狀態

// ════════════════════════════════════════════
// PANEL SWITCHING
// ════════════════════════════════════════════
function showPanel(name) {
  ['setup','chat','history'].forEach(p =>
    document.getElementById('panel-' + p).style.display = p === name ? 'block' : 'none'
  );
  if (name === 'history') loadHistory();
}

// ════════════════════════════════════════════
// SETUP CONTROLS
// ════════════════════════════════════════════
function pickLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  lang = btn.dataset.lang;
  currentVoiceLang = '';  // 強制重新載入語音
  loadVoices();
}

document.querySelectorAll('#model-chips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#model-chips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    model    = c.dataset.val;
    provider = c.dataset.provider;
  };
});

document.querySelectorAll('#scenario-chips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#scenario-chips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    scenario = c.dataset.val;
  };
});

function pickLevel(btn) {
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  level = btn.dataset.val;
}

// ════════════════════════════════════════════
// SESSION
// ════════════════════════════════════════════
function startSession() {
  sessionId = 'S' + Date.now();
  history   = [];

  document.getElementById('tag-lang').textContent  = LANG_META[lang].label;
  document.getElementById('tag-scene').textContent = SCENE_LABEL[scenario] || scenario;
  document.getElementById('tag-level').textContent = LEVEL_LABEL[level]   || level;
  document.getElementById('messages').innerHTML    = '';

  showPanel('chat');
  setupMic();
  sendToGAS('(START_SESSION)', true);  // Agent 先開口，也記錄到 Sheet
}

function endSession() {
  stopSpeaking();
  if (mediaRecorder && isRecording) { try { mediaRecorder.stop(); } catch(e){} }
  isRecording = false;
  resetMicUI();
  showPanel('setup');
}

// ════════════════════════════════════════════
// TEXT SEND
// ════════════════════════════════════════════
function sendText() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text || isSending) return;
  input.value = '';
  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  sendToGAS(text, true);
}

// ════════════════════════════════════════════
// GAS API
// ════════════════════════════════════════════
async function gasPost(type, payload) {
  const res = await fetch(GAS_URL, {
    method:   'POST',
    headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
    body:     JSON.stringify({ type, payload }),
    redirect: 'follow'
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.reply || String(data.error));
  return data;
}

async function sendToGAS(userMsg, saveLocal) {
  isSending = true;
  document.getElementById('send-btn').disabled = true;

  const tid = appendTyping();
  try {
    const data = await gasPost('chat', {
      message:   userMsg,
      model,
      provider,
      history:   history.slice(-20),
      scenario,  level,
      language:  lang,
      sessionId
    });
    removeTyping(tid);

    const reply = data.reply || '(no reply)';
    history.push({ role: 'model', content: reply });
    appendMsg('agent', reply);

    if (saveLocal) saveSession(userMsg, reply);
    if (document.getElementById('tts-on').checked) {
      const ttsText = reply.includes('---COACH---') ? reply.split('---COACH---')[0].trim() : reply;
      speakText(ttsText);
    }

  } catch(e) {
    removeTyping(tid);
    appendMsg('agent', '⚠️ 錯誤：' + e.message);
  }
  isSending = false;
  document.getElementById('send-btn').disabled = false;
}

// ════════════════════════════════════════════
// MICROPHONE + AUDIO
// ════════════════════════════════════════════
function setupMic() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/mp4';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        audioChunks = [];
        await sendAudio(blob, mediaRecorder.mimeType);
      };
      document.getElementById('mic-label').textContent = '點擊錄音';
    })
    .catch(() => {
      document.getElementById('mic-label').textContent = '無法存取麥克風';
      document.getElementById('mic-btn').disabled = true;
    });
}

function toggleMic() {
  if (!mediaRecorder) { setupMic(); return; }
  if (isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    resetMicUI();
  } else {
    audioChunks = [];
    mediaRecorder.start();
    isRecording = true;
    stopSpeaking();
    document.getElementById('mic-btn').classList.add('rec');
    document.getElementById('mic-btn').textContent     = '⏹️';
    document.getElementById('mic-label').textContent   = '錄音中… 再按停止';
  }
}

async function sendAudio(blob, mimeType) {
  isSending = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('mic-btn').disabled  = true;
  document.getElementById('mic-label').textContent = '辨識中…';

  const tid = appendTyping();

  const base64 = await blobToBase64(blob);
  try {
    const data = await gasPost('audio', {
      audioBase64: base64,
      mimeType,
      history:  history.slice(-20),
      scenario, level, model, provider,
      language: lang,
      sessionId
    });
    removeTyping(tid);

    const transcript = data.transcript || '';
    const reply      = data.reply      || '(no reply)';

    if (transcript) {
      appendMsg('user', transcript, true);   // true = 顯示語音辨識標籤
      history.push({ role: 'user', content: transcript });
    }
    history.push({ role: 'model', content: reply });
    appendMsg('agent', reply);

    saveSession(transcript, reply);          // 存到 localStorage
    if (document.getElementById('tts-on').checked) {
      const ttsText = reply.includes('---COACH---') ? reply.split('---COACH---')[0].trim() : reply;
      speakText(ttsText);
    }

  } catch(e) {
    removeTyping(tid);
    appendMsg('agent', '⚠️ ' + e.message);
  }

  isSending = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('mic-btn').disabled  = false;
  resetMicUI();
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

// ════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════
function speakText(text) {
  stopSpeaking();
  const u  = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g, ''));
  u.lang   = LANG_META[lang].ttsLang;
  u.rate   = LANG_META[lang].ttsRate;
  // 套用選定的語音
  const sel = document.getElementById('voice-select');
  if (sel && sel.value) {
    const voices = window.speechSynthesis.getVoices();
    const picked = voices.find(v => v.name === sel.value);
    if (picked) u.voice = picked;
  }
  window.speechSynthesis.speak(u);
}
function stopSpeaking() { window.speechSynthesis.cancel(); }

// 語音清單載入
let currentVoiceLang = '';
function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  const ttsLang = LANG_META[lang].ttsLang;    // e.g. 'en-US', 'ja-JP'
  const prefix  = ttsLang.split('-')[0];       // e.g. 'en', 'ja'
  const sel     = document.getElementById('voice-select');
  if (!sel) return;
  // 避免重複更新
  if (currentVoiceLang === prefix && sel.options.length > 1) return;
  currentVoiceLang = prefix;
  const filtered = voices.filter(v => v.lang.startsWith(prefix));
  sel.innerHTML = '';
  if (!filtered.length) {
    sel.innerHTML = '<option>(無可用語音)</option>';
    return;
  }
  filtered.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name.replace(/Microsoft |Google |Apple /g, '') + (v.localService ? '' : ' ☁️');
    sel.appendChild(opt);
  });
}
window.speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 500);  // fallback

// ════════════════════════════════════════════
// DOM HELPERS
// ════════════════════════════════════════════
function appendMsg(role, text, isVoice = false) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + role;

  const voiceTag = isVoice ? '<div class="voice-tag">🎤 語音辨識</div>' : '';
  const ttsBtn   = role === 'agent'
    ? `<button class="tts-btn" onclick="speakFromBtn(this)" title="朗讀此訊息">🔊 朗讀</button>`
    : '';

  // 解析教練回饋（僅 Agent 訊息）
  let chatPart  = text;
  let coachHtml = '';
  if (role === 'agent') {
    // 清理可能被 AI 原封輸出的標記
    chatPart = chatPart.replace(/═+\s*PART\s*\d[^═]*═+/g, '').trim();
    if (chatPart.includes('---COACH---')) {
      const parts = chatPart.split('---COACH---');
      chatPart = parts[0].trim();
      const coachText = parts[1].trim();
      if (coachText) {
        coachHtml = `<div class="coach-box"><div class="coach-title">🎯 口說教練回饋</div>${esc(coachText).replace(/\n/g, '<br>')}</div>`;
      }
    }
  }

  div.innerHTML = `
    <div class="avatar">${role === 'agent' ? '🤖' : '🧑'}</div>
    <div class="msg-body">
      ${voiceTag}
      <div class="bubble">${esc(chatPart).replace(/\n/g, '<br>')}</div>
      ${coachHtml}
      ${ttsBtn}
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function speakFromBtn(btn) {
  const text = btn.closest('.msg-body').querySelector('.bubble').textContent;
  speakText(text);
}

function appendTyping() {
  const id   = 'tid-' + tidCounter++;
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg agent'; div.id = id;
  div.innerHTML = `<div class="avatar">🤖</div><div class="msg-body"><div class="bubble typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}
function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

function resetMicUI() {
  document.getElementById('mic-btn').classList.remove('rec');
  document.getElementById('mic-btn').textContent   = '🎤';
  document.getElementById('mic-label').textContent = '點擊錄音';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════
// LOCAL STORAGE — 對話紀錄
// ════════════════════════════════════════════
const LS_KEY = 'speaking_agent_sessions';

function saveSession(userMsg, agentMsg) {
  if (!userMsg) return;
  if (userMsg === '(START_SESSION)') userMsg = '（開始對話）';
  const all = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  if (!all[sessionId]) {
    all[sessionId] = {
      id:          sessionId,
      time:        new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
      lang:        LANG_META[lang].label,
      scenario:    SCENE_LABEL[scenario] || scenario,
      level:       LEVEL_LABEL[level]    || level,
      modelKey:    model,
      providerKey: provider,
      langKey:     lang,
      scenarioKey: scenario,
      levelKey:    level,
      turns:       []
    };
  }
  all[sessionId].turns.push({ user: userMsg, agent: agentMsg });
  localStorage.setItem(LS_KEY, JSON.stringify(all));
}

function loadHistory() {
  const all      = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  const sessions = Object.values(all).sort((a, b) => b.id.localeCompare(a.id));
  const body     = document.getElementById('history-body');

  if (!sessions.length) {
    body.innerHTML = '<p style="color:#bbb;text-align:center;padding:32px;font-size:14px">還沒有對話紀錄</p>';
    return;
  }

  body.innerHTML = sessions.map(s => `
    <div class="sess-item" onclick="showSessionDetail('${s.id}')">
      <div class="sess-meta">${s.time} ｜ ${s.lang} ｜ ${s.scenario} ｜ ${s.level}</div>
      <div class="sess-preview">${esc(s.turns[0]?.agent?.slice(0, 80) || '')}…</div>
      <div class="sess-turns">共 ${s.turns.length} 輪對話</div>
    </div>
  `).join('');
}

function showSessionDetail(id) {
  const all  = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  const s    = all[id];
  if (!s) return;
  const body = document.getElementById('history-body');

  body.innerHTML = `
    <button class="back-btn" onclick="loadHistory()" style="margin-bottom:16px">← 返回列表</button>
    <div style="font-size:13px;color:#aaa;margin-bottom:12px">${s.time} ｜ ${s.lang} ｜ ${s.scenario} ｜ ${s.level}｜ ${s.turns.length} 輪</div>
    <button class="send-btn" style="margin-bottom:20px;width:100%" onclick="resumeSession('${id}')">💬 繼續對話</button>
    ${s.turns.map((t, i) => `
      <div class="detail-turn">
        <div class="detail-label">🧑 第 ${i+1} 輪 — 你說</div>
        <div class="detail-bubble detail-user">${esc(t.user)}</div>
      </div>
      <div class="detail-turn">
        <div class="detail-label">🤖 Agent 回應</div>
        <div class="detail-bubble detail-agent">${esc(t.agent)}</div>
      </div>
    `).join('')}
  `;
}

function resumeSession(id) {
  const all = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  const s   = all[id];
  if (!s) return;

  // 還原設定
  lang     = s.langKey     || 'en';
  scenario = s.scenarioKey || 'daily';
  level    = s.levelKey    || 'intermediate';
  model    = s.modelKey    || 'gemini-2.5-flash';
  provider = s.providerKey || (model.includes('llama') ? 'groq' : 'gemini');

  // 還原對話歷史
  history   = [];
  sessionId = s.id;
  s.turns.forEach(t => {
    if (t.user && t.user !== '（開始對話）') {
      history.push({ role: 'user', content: t.user });
    }
    if (t.agent) {
      // 只保留對話部分，不包含教練回饋
      const chatOnly = t.agent.includes('---COACH---') ? t.agent.split('---COACH---')[0].trim() : t.agent;
      history.push({ role: 'model', content: chatOnly });
    }
  });

  // 切到聊天畫面
  showPanel('chat');
  document.getElementById('chat-model-badge').textContent = MODEL_LABEL[model] || model;
  document.getElementById('messages').innerHTML = '';

  // 重新顯示對話
  s.turns.forEach(t => {
    if (t.user && t.user !== '（開始對話）') appendMsg('user', t.user);
    if (t.agent) appendMsg('agent', t.agent);
  });
}
</script>
